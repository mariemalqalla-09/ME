<!DOCTYPE html></!DOCTYPE>
<html>
    <head>
        <title>My first website</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav class="navbar">
            <h2>My website</h2>

            <div class="nav-links">
                <a href="#hero">Home</a>
                <a href="#cards">About Me</a>
                <a href="#form">About You</a>
            </div>
        </nav>
        <section id="hero">
            <span class="badge">Welcome !</span>
            <div class="hero-text">
        <h1>My First Website!!</h1>
        <p>I am learning how to build a website with SPRIX</p>
        <button> Start Learning</button>
        <a href="https://sprixportal.jp/">open website</a><div class="logo"><img src="logo_RGB_SPRIX.png" alt="SPRIX logo"></div>
            </div>
        </section>
        <section id="cards" class="cards section">
        <h2>Things I Love</h2>
        <div class="cards-container">
            <div class="card">
        <p class="highlight">I love to crochet</p>
        <img src="crochet.jpg" alt="Crochet">
        <button>See projects</button>
            </div>
            <div class="card">
        <p>I like coding</p>
        <img src="code.jpg" alt="coding">
        <button>See projects</button>
            </div>
            <div class="card">
                <p>I play Football</p>
                <img src="football.jpg" alt="Football">
                <button>See videos</button>
            </div>
        </div>
        </section>
        <section id="form" class="form-section">
        <div class="card">
            <h4>What about you?</h4>
        <form>
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Enter Your Name">
            <label for="sport">Your Favourite Sport</label>
            <input type="text" id="sport" placeholder="Enter Your Favourite Sport">
            <label for="phone number">Your phone number</label>
            <input type="number" id="phone number" placeholder="Enter Your Phone Number">
            <button type="Submit">Submit</button>
        </form>
        </div>
        </section>
        <section class="banner">
            <img src="code.jpg" alt="coding">

            <div class="banner-text">
                <h2>Want to build a website with me ?</h2>
                <p>Use HTML and CSS to Create WebPage</p>
                <button>Try it !</button>
            </div>
        </section>
    </body>

</html>
